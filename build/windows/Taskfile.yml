version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Build binary for Windows
    deps:
      - task: common:build:frontend
        vars:
          DEV: '{{.DEV}}'
      - task: generate:syso
        vars:
          ARCH: '{{.ARCH | default ARCH}}'
    cmds:
      - powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.BIN_DIR}}' | Out-Null"
      - go build {{if ne .DEV "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui"{{end}} -o {{.OUTPUT | default (printf "%s/%s.exe" .BIN_DIR .APP_NAME)}}
      - powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -Force -ErrorAction SilentlyContinue *.syso"
    env:
      GOOS: windows
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_ENABLED: 0

  generate:syso:
    summary: Generate Windows resource .syso
    dir: build
    cmds:
      - powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "if ((Test-Path 'windows/info.json') -and (Test-Path 'windows/wails.exe.manifest')) { if (-not (Test-Path 'windows/icon.ico') -and (Test-Path 'appicon.png')) { wails3 generate icons -input appicon.png -windowsfilename windows/icon.ico }; wails3 generate syso -arch {{.ARCH | default ARCH}} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out '..\\wails_windows_{{.ARCH | default ARCH}}.syso' }"

  package:
    summary: Package Windows NSIS installer
    deps:
      - task: build

  run:
    summary: Run Windows executable
    deps:
      - task: build
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'

  run:nobuild:
    summary: Run already-built Windows executable
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'
