version: '3'

info:
  companyName: "SUDOKU-ASCII"
  productName: "4x4 sudoku"
  productIdentifier: "com.sudokuascii.sudoku4x4"
  description: "A Wails desktop client for Sudoku proxy controls"
  copyright: "(c) 2026, SUDOKU-ASCII"
  comments: "Sudoku desktop"
  version: "0.0.5"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 800
  ignore:
    dir:
      - .git
      - node_modules
      - frontend/node_modules
      - frontend/dist
      - build/bin
    file:
      - .DS_Store
    watched_extension:
      - "*.go"
      - "*.ts"
      - "*.js"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run:nobuild
      type: primary

fileAssociations: []
other:
  - name: runtime
