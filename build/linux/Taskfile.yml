version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Build binary for Linux
    deps:
      - task: common:build:frontend
        vars:
          DEV: '{{.DEV}}'
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build {{if ne .DEV "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s"{{end}} -o {{.OUTPUT | default (printf "%s/%s" .BIN_DIR .APP_NAME)}}
    env:
      GOOS: linux
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_ENABLED: 1

  package:
    summary: Package Linux tarball payload
    deps:
      - task: build
    cmds:
      - mkdir -p dist
      - |
        set -euo pipefail
        stage="$(mktemp -d)"
        trap 'rm -rf "${stage}"' EXIT

        bin="{{.OUTPUT | default (printf "%s/%s" .BIN_DIR .APP_NAME)}}"
        cp -f "${bin}" "${stage}/{{.APP_NAME}}"
        cp -f "build/appicon.png" "${stage}/{{.APP_NAME}}.png"
        cp -f "build/linux/{{.APP_NAME}}.desktop.in" "${stage}/{{.APP_NAME}}.desktop.in"
        cp -f "build/linux/install.sh" "${stage}/install.sh"

        tar -czf "dist/{{.APP_NAME}}_linux-{{.ARCH | default ARCH}}.tar.gz" -C "${stage}" .

  run:
    summary: Run Linux binary
    deps:
      - task: build
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'

  run:nobuild:
    summary: Run already-built Linux binary
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'
