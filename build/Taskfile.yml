version: '3'

tasks:
  go:mod:tidy:
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules
    cmds:
      - npm install

  generate:bindings:
    summary: Generates frontend bindings
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/bindings/**/*
    cmds:
      - wails3 generate bindings -clean=true -ts

  build:frontend:
    summary: Build frontend assets
    dir: frontend
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
    cmds:
      - |
        {{if eq .DEV "true"}}
        echo "skip frontend bundle in DEV=true (vite dev server provides assets)"
        {{else}}
        npm run build
        {{end}}

  dev:frontend:
    summary: Runs frontend dev server
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - npm run dev -- --port {{.VITE_PORT}} --strictPort
