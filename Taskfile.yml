version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  APP_NAME: "sudoku4x4"
  BIN_DIR: "build/bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  build:
    summary: Builds the application for current OS
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages the application for current OS
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the built application for current OS
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs Wails v3 dev mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
