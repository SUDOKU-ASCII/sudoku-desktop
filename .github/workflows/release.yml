name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: darwin/amd64
            artifact: darwin-amd64
          - runner: macos-latest
            platform: darwin/arm64
            artifact: darwin-arm64
          - runner: windows-latest
            platform: windows/amd64
            artifact: windows-amd64
          - runner: ubuntu-24.04
            platform: linux/amd64
            artifact: linux-amd64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Checkout Fallback (Retry)
        if: steps.checkout.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          REPO_URL="https://github.com/${{ github.repository }}.git"
          TARGET_SHA="${{ github.sha }}"

          for attempt in 1 2 3 4 5; do
            echo "Fallback checkout attempt ${attempt}/5"
            rm -rf .git
            git init .
            git remote add origin "${REPO_URL}"
            if git -c protocol.version=2 fetch --no-tags --depth=1 origin "${TARGET_SHA}" && git checkout --detach FETCH_HEAD; then
              echo "Fallback checkout succeeded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Fallback checkout failed after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev || true
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.1

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare core binaries
        shell: bash
        run: |
          set -euo pipefail
          export PLATFORM="${{ matrix.platform }}"
          export GOOS="${PLATFORM%/*}"
          export GOARCH="${PLATFORM#*/}"
          ./scripts/build_sudoku_target.sh
          ./scripts/fetch_hev_release.sh

      - name: Build app
        shell: bash
        run: |
          set -euo pipefail
          PLATFORM="${{ matrix.platform }}"
          ARCH="${PLATFORM#*/}"
          if [ "${{ runner.os }}" == "Windows" ]; then
            wails3 task windows:build ARCH="${ARCH}" OUTPUT=build/bin/sudoku4x4.exe
          elif [ "${{ runner.os }}" == "Linux" ]; then
            wails3 task linux:build ARCH="${ARCH}" OUTPUT=build/bin/sudoku4x4
          else
            wails3 task darwin:package ARCH="${ARCH}" OUTPUT=build/bin/sudoku4x4
          fi
          PLATFORM="${PLATFORM}" ./scripts/bundle_runtime_into_build.sh

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APP_SRC_DIR="build/bin"
          DMG_PATH="dist/sudoku4x4_${{ github.ref_name }}_${{ matrix.artifact }}.dmg"
          create-dmg \
            --volname "sudoku4x4 ${{ github.ref_name }}" \
            --window-pos 200 120 \
            --window-size 820 460 \
            --icon-size 100 \
            --icon "sudoku4x4.app" 220 230 \
            --hide-extension "sudoku4x4.app" \
            --app-drop-link 600 230 \
            "$DMG_PATH" \
            "$APP_SRC_DIR"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"]
          artifact = os.environ["ARTIFACT"]
          root = Path("build/bin")
          out = Path("dist") / f"sudoku4x4_{version}_{artifact}.zip"

          with zipfile.ZipFile(out, "w", compression=zipfile.ZIP_DEFLATED) as z:
            z.write(root / "sudoku4x4.exe", arcname="sudoku4x4.exe")
          print(out)
          PY
        env:
          ARTIFACT: ${{ matrix.artifact }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf "dist/sudoku4x4_${{ github.ref_name }}_${{ matrix.artifact }}.tar.gz" -C "build/bin" "sudoku4x4"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare dist folder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -maxdepth 2 -type f -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" dist/
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          from pathlib import Path

          dist = Path("dist")
          files = []
          for p in dist.iterdir():
            if not p.is_file():
              continue
            if p.name == "SHA256SUMS.txt":
              continue
            if p.suffix in (".sig", ".pub", ".pem", ".crt", ".cer"):
              continue
            files.append(p)

          lines = []
          for p in sorted(files, key=lambda x: x.name):
            h = hashlib.sha256(p.read_bytes()).hexdigest()
            lines.append(f"{h}  {p.name}")

          (dist / "SHA256SUMS.txt").write_text("\n".join(lines) + ("\n" if lines else ""), encoding="utf-8")
          print(dist / "SHA256SUMS.txt")
          PY

      - name: Install cosign
        if: env.KEYSTORE_BASE64 != ''
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (cosign)
        if: env.KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("KEYSTORE_BASE64", "").strip()
          if not raw:
            raise SystemExit("KEYSTORE_BASE64 is empty")
          Path("cosign.key").write_bytes(base64.b64decode(raw))
          PY

          export COSIGN_PASSWORD="${KEYSTORE_PASSWORD}"
          cosign public-key --key cosign.key > dist/cosign.pub
          cosign sign-blob --yes --key cosign.key --output-signature dist/SHA256SUMS.txt.sig dist/SHA256SUMS.txt
          rm -f cosign.key

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: false
