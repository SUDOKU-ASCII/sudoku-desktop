name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: darwin/amd64
            artifact: darwin-amd64
          - runner: macos-latest
            platform: darwin/arm64
            artifact: darwin-arm64
          - runner: windows-latest
            platform: windows/amd64
            artifact: windows-amd64
          - runner: ubuntu-22.04
            platform: linux/amd64
            artifact: linux-amd64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev || true

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare core binaries
        shell: bash
        run: |
          set -euo pipefail
          export PLATFORM="${{ matrix.platform }}"
          export GOOS="${PLATFORM%/*}"
          export GOARCH="${PLATFORM#*/}"
          ./scripts/build_sudoku_target.sh
          ./scripts/fetch_hev_release.sh

      # 在这里区分 Windows 和其他系统，为 Windows 添加 .exe 后缀
      - name: Build app
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" == "Windows" ]; then
            wails build -clean -s -platform "${{ matrix.platform }}" -o sudoku4x4.exe
          else
            wails build -clean -s -platform "${{ matrix.platform }}" -o sudoku4x4
          fi
          PLATFORM="${{ matrix.platform }}" ./scripts/bundle_runtime_into_build.sh

      - name: Prepare macOS signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          MACOS_CERT_IDENTITY: ${{ secrets.MACOS_CERT_IDENTITY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_API_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_P8_BASE64 }}
          CERT_PATH: ${{ runner.temp }}/codesign.p12
          NOTARY_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.MACOS_NOTARY_KEY_ID }}.p8
        run: |
          set -euo pipefail

          for key in MACOS_CERT_P12_BASE64 MACOS_CERT_P12_PASSWORD MACOS_NOTARY_KEY_ID MACOS_NOTARY_ISSUER_ID MACOS_NOTARY_API_KEY_P8_BASE64; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

          KEYCHAIN_PATH="${RUNNER_TEMP}/codesign.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="${RUNNER_TEMP}/codesign.p12"
          NOTARY_KEY_PATH="${RUNNER_TEMP}/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"

          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert = os.environ["MACOS_CERT_P12_BASE64"].strip()
          key = os.environ["MACOS_NOTARY_API_KEY_P8_BASE64"].strip()
          Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(cert))
          Path(os.environ["NOTARY_KEY_PATH"]).write_bytes(base64.b64decode(key))
          PY

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERT_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          SIGN_IDENTITY="${MACOS_CERT_IDENTITY:-}"
          if [ -z "${SIGN_IDENTITY}" ]; then
            SIGN_IDENTITY="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | awk -F\" '/Developer ID Application/ {print $2; exit}')"
          fi
          if [ -z "${SIGN_IDENTITY}" ]; then
            echo "Unable to resolve signing identity (Developer ID Application)." >&2
            security find-identity -v -p codesigning "${KEYCHAIN_PATH}" || true
            exit 1
          fi

          echo "MACOS_SIGN_IDENTITY=${SIGN_IDENTITY}" >> "${GITHUB_ENV}"
          echo "MACOS_SIGN_KEYCHAIN=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "MACOS_SIGN_KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "${GITHUB_ENV}"
          echo "MACOS_NOTARY_KEY_PATH=${NOTARY_KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Sign and notarize app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail

          APP_PATH="build/bin/sudoku4x4.app"
          if [ ! -d "${APP_PATH}" ]; then
            APP_PATH="$(find build/bin -maxdepth 1 -type d -name '*.app' | head -n 1)"
          fi
          if [ -z "${APP_PATH}" ] || [ ! -d "${APP_PATH}" ]; then
            echo "App bundle not found under build/bin" >&2
            exit 1
          fi

          # Sign nested code and the app bundle with hardened runtime.
          codesign --force --deep --options runtime --timestamp --sign "${MACOS_SIGN_IDENTITY}" "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"

          NOTARY_INPUT="${RUNNER_TEMP}/notary_${{ matrix.artifact }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${NOTARY_INPUT}"

          xcrun notarytool submit "${NOTARY_INPUT}" \
            --key "${MACOS_NOTARY_KEY_PATH}" \
            --key-id "${MACOS_NOTARY_KEY_ID}" \
            --issuer "${MACOS_NOTARY_ISSUER_ID}" \
            --wait

          xcrun stapler staple -v "${APP_PATH}"
          spctl --assess --type execute --verbose=4 "${APP_PATH}"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/bin/sudoku4x4.app" "dist/sudoku4x4_${{ github.ref_name }}_${{ matrix.artifact }}.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"]
          artifact = os.environ["ARTIFACT"]
          root = Path("build/bin")
          out = Path("dist") / f"sudoku4x4_{version}_{artifact}.zip"

          with zipfile.ZipFile(out, "w", compression=zipfile.ZIP_DEFLATED) as z:
            z.write(root / "sudoku4x4.exe", arcname="sudoku4x4.exe")
            for p in (root / "runtime").rglob("*"):
              if p.is_file():
                z.write(p, arcname=str(p.relative_to(root)))
          print(out)
          PY
        env:
          ARTIFACT: ${{ matrix.artifact }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf "dist/sudoku4x4_${{ github.ref_name }}_${{ matrix.artifact }}.tar.gz" -C "build/bin" "sudoku4x4" "runtime"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare dist folder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -maxdepth 2 -type f -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" dist/
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          from pathlib import Path

          dist = Path("dist")
          files = []
          for p in dist.iterdir():
            if not p.is_file():
              continue
            if p.name == "SHA256SUMS.txt":
              continue
            if p.suffix in (".sig", ".pub", ".pem", ".crt", ".cer"):
              continue
            files.append(p)

          lines = []
          for p in sorted(files, key=lambda x: x.name):
            h = hashlib.sha256(p.read_bytes()).hexdigest()
            lines.append(f"{h}  {p.name}")

          (dist / "SHA256SUMS.txt").write_text("\n".join(lines) + ("\n" if lines else ""), encoding="utf-8")
          print(dist / "SHA256SUMS.txt")
          PY

      - name: Install cosign
        if: env.KEYSTORE_BASE64 != ''
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (cosign)
        if: env.KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("KEYSTORE_BASE64", "").strip()
          if not raw:
            raise SystemExit("KEYSTORE_BASE64 is empty")
          Path("cosign.key").write_bytes(base64.b64decode(raw))
          PY

          export COSIGN_PASSWORD="${KEYSTORE_PASSWORD}"
          cosign public-key --key cosign.key > dist/cosign.pub
          cosign sign-blob --yes --key cosign.key --output-signature dist/SHA256SUMS.txt.sig dist/SHA256SUMS.txt
          rm -f cosign.key

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
